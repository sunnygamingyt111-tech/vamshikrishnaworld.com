        h1 {
            margin-top: 30px;
            font-size: 28px;
            text-shadow: 0 0 10px cyan;
        }

        .container {

        .card h2 {

        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            color: black;
            background: cyan;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 0 10px cyan;
        }

        .coming {
            color: gray;
            font-style: italic;
        }

</head>

<body>

<div class="container">

            Visit Channel
        </a>
    </div>

    <div class="card">

</html>
