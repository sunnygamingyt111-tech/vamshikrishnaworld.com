        }

            margin: 20px;
            padding: 20px;

            background: #111;

            box-shadow: 0 0 25px cyan;
        }

        img {
            width: 120px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 10px;
            background: cyan;
            color: black;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        iframe {
            margin-top: 15px;
            width: 100%;
            max-width: 400px;
            height: 200px;
            border-radius: 10px;
        }

        .coming {
            color: gray;
        }
